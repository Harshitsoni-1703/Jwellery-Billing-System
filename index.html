<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satyam Jewellers | Live Multi-Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #dfbb44; --silver: #c0c0c0; --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.08); --success: #2ecc71; --danger: #e74c3c;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: #fff; overflow-x: hidden; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 30%, #1a1508 0%, #000 100%); }

        /* Banner & Nav */
        .brand-banner { width: 100%; padding: 30px 0; text-align: center; border-bottom: 1px solid rgba(223, 187, 68, 0.3); background: rgba(0,0,0,0.4); }
        .brand-banner h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; text-transform: uppercase; }
        nav { display: flex; justify-content: center; gap: 20px; padding: 15px; background: rgba(0,0,0,0.6); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        nav button { background: none; border: none; color: #888; cursor: pointer; font-weight: 600; padding: 10px; transition: 0.3s; }
        nav button.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Dashboard Rates */
        .container { max-width: 1100px; margin: 20px auto; width: 95%; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); display: none; animation: fadeIn 0.4s; }
        .card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .rate-box { padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; background: rgba(223, 187, 68, 0.05); }
        .rate-box.silv { border-color: var(--silver); }
        .live-tag { font-size: 0.7rem; color: var(--success); text-transform: uppercase; letter-spacing: 1px; }

        /* Multi-Item Form */
        .customer-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 10px; margin-bottom: 10px; align-items: end; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.8rem; font-weight: 600; }
        input { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; }
        
        .btn-add { background: rgba(223, 187, 68, 0.1); color: var(--gold); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin: 10px 0; font-weight: bold; }
        .btn-save { width: 100%; padding: 15px; background: linear-gradient(45deg, #bf953f, #fcf6ba); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
        
        /* Summary Table */
        .summary { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 10px; color: var(--gold); border-bottom: 2px solid #333; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="brand-banner"><h1>Satyam Jewellers</h1></div>

    <nav>
        <button onclick="nav('home')" id="n-home" class="active">DASHBOARD</button>
        <button onclick="nav('entry')" id="n-entry">CREATE BILL</button>
        <button onclick="nav('history')" id="n-history">HISTORY</button>
    </nav>

    <div class="container">
        <div id="home" class="card active">
            <div class="rate-grid">
                <div class="rate-box">
                    <span class="live-tag" id="g-status">● Live</span><br>
                    <small>GOLD 24K (10g)</small>
                    <h2 id="gold-val">₹ 75,420</h2>
                </div>
                <div class="rate-box silv">
                    <span class="live-tag" id="s-status">● Live</span><br>
                    <small>SILVER (1kg)</small>
                    <h2 id="silver-val">₹ 91,800</h2>
                </div>
            </div>
            <p style="text-align:center; color:#555; font-size:0.7rem;">Note: If API fails, manual rates can be used for billing.</p>
        </div>

        <div id="entry" class="card">
            <div class="customer-info">
                <div class="group">
                    <label>Purchase Date</label>
                    <input type="date" id="pDate">
                </div>
                <div class="group">
                    <label>Customer Name</label>
                    <input type="text" id="cName" placeholder="Name">
                </div>
                <div class="group">
                    <label>Mobile</label>
                    <input type="number" id="cMob" placeholder="Mobile">
                </div>
            </div>

            <div id="items-container">
                <label>Items List</label>
                <div class="item-row">
                    <input type="text" class="i-name" placeholder="Item Name">
                    <input type="number" class="i-weight" placeholder="Weight (g)">
                    <input type="number" class="i-price" oninput="updateTotal()" placeholder="Price (₹)">
                    <div></div>
                </div>
            </div>
            <button class="btn-add" onclick="addItem()">+ Add Item</button>

            <div class="summary">
                <div style="display:flex; justify-content:space-between;">
                    <span>Total Bill:</span> <b id="sub-total">₹ 0</b>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <span>Paid:</span> <input type="number" id="paid-amt" oninput="updateTotal()" style="width:100px; padding:5px;">
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--gold); font-size:1.2rem;">
                    <b>Baki (Balance):</b> <b id="baki-amt">₹ 0</b>
                </div>
            </div>
            <button class="btn-save" onclick="saveBill()">SAVE TRANSACTION</button>
        </div>

        <div id="history" class="card">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Baki</th>
                        </tr>
                    </thead>
                    <tbody id="h-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "goldapi-3yzvyw8smgx9eh1e-io";

        async function fetchRates() {
            // Gold Fetch
            try {
                const gRes = await fetch("https://www.goldapi.io/api/XAU/INR", { headers: {"x-access-token": API_KEY} });
                const gData = await gRes.json();
                if(gData.price) document.getElementById('gold-val').innerText = "₹ " + Math.round((gData.price/31.1035)*10).toLocaleString();
            } catch(e) { document.getElementById('g-status').innerText = "● Demo Mode"; }

            // Silver Fetch (Alag Try-Catch taaki Gold block na ho)
            try {
                const sRes = await fetch("https://www.goldapi.io/api/XAG/INR", { headers: {"x-access-token": API_KEY} });
                const sData = await sRes.json();
                if(sData.price) document.getElementById('silver-val').innerText = "₹ " + Math.round((sData.price/31.1035)*1000).toLocaleString();
            } catch(e) { document.getElementById('s-status').innerText = "● Demo Mode"; }
        }

        function addItem() {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<input type="text" class="i-name" placeholder="Item Name">
                             <input type="number" class="i-weight" placeholder="Weight (g)">
                             <input type="number" class="i-price" oninput="updateTotal()" placeholder="Price (₹)">
                             <button style="background:var(--danger); border:none; color:white; border-radius:5px;" onclick="this.parentElement.remove(); updateTotal();">X</button>`;
            document.getElementById('items-container').appendChild(div);
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.i-price').forEach(p => total += (parseFloat(p.value) || 0));
            let paid = parseFloat(document.getElementById('paid-amt').value) || 0;
            document.getElementById('sub-total').innerText = "₹ " + total.toLocaleString();
            document.getElementById('baki-amt').innerText = "₹ " + (total - paid).toLocaleString();
            return { total, baki: total - paid };
        }

        function saveBill() {
            const name = document.getElementById('cName').value;
            const res = updateTotal();
            if(!name || res.total <= 0) return alert("Details missing!");

            const items = [];
            document.querySelectorAll('.item-row').forEach(r => {
                const n = r.querySelector('.i-name').value;
                const w = r.querySelector('.i-weight').value;
                if(n) items.push(`${n} (${w}g)`);
            });

            const db = JSON.parse(localStorage.getItem('satyam_final_khata')) || [];
            db.push({ date: document.getElementById('pDate').value, name, mob: document.getElementById('cMob').value, items: items.join(', '), total: res.total, baki: res.baki });
            localStorage.setItem('satyam_final_khata', JSON.stringify(db));
            alert("Bill Saved!");
            location.reload();
        }

        function loadHistory() {
            const db = JSON.parse(localStorage.getItem('satyam_final_khata')) || [];
            document.getElementById('h-body').innerHTML = db.slice().reverse().map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td><b>${r.name}</b><br><small>${r.mob}</small></td>
                    <td><small>${r.items}</small></td>
                    <td>₹${r.total.toLocaleString()}</td>
                    <td style="color:${r.baki > 0 ? 'var(--danger)' : 'var(--success)'}; font-weight:bold;">₹${r.baki.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function nav(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'history') loadHistory();
        }

        document.getElementById('pDate').valueAsDate = new Date();
        fetchRates();
        setInterval(fetchRates, 60000);
    </script>
</body>
</html>
